name: "Deploy"
description: "Deploys to staging automatically or production with manual approval gate. Supports Vercel, Railway, Heroku, Render, and custom targets."

inputs:
  environment:
    description: "staging | production"
    required: true
  target:
    description: "vercel | railway | heroku | render | custom"
    required: true
  language:
    description: "Runtime language"
    required: true

  # Vercel
  vercel_token:
    description: "VERCEL_TOKEN secret"
    required: false
    default: ""
  vercel_org_id:
    description: "VERCEL_ORG_ID secret"
    required: false
    default: ""
  vercel_project_id:
    description: "VERCEL_PROJECT_ID secret"
    required: false
    default: ""

  # Railway
  railway_token:
    description: "RAILWAY_TOKEN secret"
    required: false
    default: ""
  railway_service_id:
    description: "Railway service ID from config"
    required: false
    default: ""
  railway_environment:
    description: "Railway environment name"
    required: false
    default: "production"

  # Heroku
  heroku_api_key:
    description: "HEROKU_API_KEY secret"
    required: false
    default: ""
  heroku_app_name:
    description: "Heroku app name from config"
    required: false
    default: ""

  # Render
  render_api_key:
    description: "RENDER_API_KEY secret"
    required: false
    default: ""
  render_service_id:
    description: "Render service ID (srv-xxxxxxxx) from config"
    required: false
    default: ""
  render_staging_service_id:
    description: "Render staging service ID (optional — leave empty to skip staging deploy)"
    required: false
    default: ""

  # Custom
  custom_command:
    description: "Custom deploy command to run"
    required: false
    default: ""

  # Metadata
  project_name:
    description: "Project name for notifications"
    required: false
    default: "project"

outputs:
  deploy_url:
    description: "URL of the deployed environment"
    value: ${{ steps.capture-url.outputs.url }}
  deploy_status:
    description: "success | failure"
    value: ${{ steps.gate.outputs.status }}

runs:
  using: "composite"
  steps:

    # ── Download build artifact ───────────────────────────────────────────────
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: build-artifact
      continue-on-error: true   # Not all projects produce a build artifact

    # =========================================================================
    # PRE-DEPLOY CHECKS
    # =========================================================================
    - name: Pre-deploy checks
      shell: bash
      run: |
        python3 "${{ github.action_path }}/pre_deploy_check.py" \
          --target    "${{ inputs.target }}" \
          --env       "${{ inputs.environment }}" \
          --language  "${{ inputs.language }}"

    # =========================================================================
    # VERCEL
    # =========================================================================
    - name: Deploy to Vercel (staging)
      id: deploy-vercel-staging
      if: inputs.target == 'vercel' && inputs.environment == 'staging'
      shell: bash
      env:
        VERCEL_TOKEN:      ${{ inputs.vercel_token }}
        VERCEL_ORG_ID:     ${{ inputs.vercel_org_id }}
        VERCEL_PROJECT_ID: ${{ inputs.vercel_project_id }}
      run: |
        npm install -g vercel --silent
        URL=$(vercel deploy \
          --token="$VERCEL_TOKEN" \
          --yes \
          --env DEPLOYMENT_ENV=staging \
          2>&1 | tail -1)
        echo "url=$URL" >> $GITHUB_OUTPUT
        echo "Deployed to staging: $URL"

    - name: Deploy to Vercel (production)
      id: deploy-vercel-prod
      if: inputs.target == 'vercel' && inputs.environment == 'production'
      shell: bash
      env:
        VERCEL_TOKEN:      ${{ inputs.vercel_token }}
        VERCEL_ORG_ID:     ${{ inputs.vercel_org_id }}
        VERCEL_PROJECT_ID: ${{ inputs.vercel_project_id }}
      run: |
        npm install -g vercel --silent
        URL=$(vercel deploy \
          --token="$VERCEL_TOKEN" \
          --prod \
          --yes \
          2>&1 | tail -1)
        echo "url=$URL" >> $GITHUB_OUTPUT
        echo "Deployed to production: $URL"

    # =========================================================================
    # RAILWAY
    # =========================================================================
    - name: Deploy to Railway (staging)
      id: deploy-railway-staging
      if: inputs.target == 'railway' && inputs.environment == 'staging'
      shell: bash
      env:
        RAILWAY_TOKEN: ${{ inputs.railway_token }}
      run: |
        npm install -g @railway/cli --silent
        railway up \
          --service "${{ inputs.railway_service_id }}" \
          --environment staging \
          --detach
        URL=$(railway domain \
          --service "${{ inputs.railway_service_id }}" \
          --environment staging 2>/dev/null || echo "")
        echo "url=${URL}" >> $GITHUB_OUTPUT
        echo "Deployed to Railway staging"

    - name: Deploy to Railway (production)
      id: deploy-railway-prod
      if: inputs.target == 'railway' && inputs.environment == 'production'
      shell: bash
      env:
        RAILWAY_TOKEN: ${{ inputs.railway_token }}
      run: |
        npm install -g @railway/cli --silent
        railway up \
          --service "${{ inputs.railway_service_id }}" \
          --environment "${{ inputs.railway_environment }}" \
          --detach
        URL=$(railway domain \
          --service "${{ inputs.railway_service_id }}" \
          --environment "${{ inputs.railway_environment }}" 2>/dev/null || echo "")
        echo "url=${URL}" >> $GITHUB_OUTPUT
        echo "Deployed to Railway production"

    # =========================================================================
    # HEROKU
    # =========================================================================
    - name: Deploy to Heroku (staging)
      id: deploy-heroku-staging
      if: inputs.target == 'heroku' && inputs.environment == 'staging'
      shell: bash
      env:
        HEROKU_API_KEY: ${{ inputs.heroku_api_key }}
      run: |
        # Install Heroku CLI if not present
        if ! command -v heroku &>/dev/null; then
          curl -fsSL https://cli-assets.heroku.com/install.sh | sh
        fi
        STAGING_APP="${{ inputs.heroku_app_name }}-staging"
        # Create staging app if it doesn't exist
        heroku apps:info "$STAGING_APP" &>/dev/null || \
          heroku apps:create "$STAGING_APP" --no-remote
        # Push via git
        git remote add heroku-staging \
          "https://heroku:${HEROKU_API_KEY}@git.heroku.com/${STAGING_APP}.git" \
          2>/dev/null || true
        git push heroku-staging HEAD:main --force
        echo "url=https://${STAGING_APP}.herokuapp.com" >> $GITHUB_OUTPUT

    - name: Deploy to Heroku (production)
      id: deploy-heroku-prod
      if: inputs.target == 'heroku' && inputs.environment == 'production'
      shell: bash
      env:
        HEROKU_API_KEY: ${{ inputs.heroku_api_key }}
      run: |
        if ! command -v heroku &>/dev/null; then
          curl -fsSL https://cli-assets.heroku.com/install.sh | sh
        fi
        git remote add heroku \
          "https://heroku:${HEROKU_API_KEY}@git.heroku.com/${{ inputs.heroku_app_name }}.git" \
          2>/dev/null || true
        git push heroku HEAD:main --force
        echo "url=https://${{ inputs.heroku_app_name }}.herokuapp.com" >> $GITHUB_OUTPUT

    # =========================================================================
    # RENDER
    # Render deploys via a webhook trigger — no CLI needed.
    # Each service has a unique deploy hook URL containing the API key.
    # Staging uses a separate service; production uses the main service.
    # Render automatically builds and deploys from the latest commit on
    # the connected branch after the hook fires.
    # =========================================================================
    - name: Deploy to Render (staging)
      id: deploy-render-staging
      if: inputs.target == 'render' && inputs.environment == 'staging' && inputs.render_staging_service_id != ''
      shell: bash
      env:
        RENDER_API_KEY: ${{ inputs.render_api_key }}
      run: |
        echo "Triggering Render staging deploy for service: ${{ inputs.render_staging_service_id }}"
        RESPONSE=$(curl -s -o /tmp/render_response.json -w "%{http_code}" \
          -X POST \
          -H "Authorization: Bearer ${RENDER_API_KEY}" \
          -H "Content-Type: application/json" \
          "https://api.render.com/v1/services/${{ inputs.render_staging_service_id }}/deploys" \
          --data '{"clearCache": "do_not_clear"}')
        cat /tmp/render_response.json
        if [ "$RESPONSE" != "201" ]; then
          echo "::error::Render staging deploy API returned HTTP $RESPONSE"
          exit 1
        fi
        # Extract service URL from service details
        SVC=$(curl -s \
          -H "Authorization: Bearer ${RENDER_API_KEY}" \
          "https://api.render.com/v1/services/${{ inputs.render_staging_service_id }}")
        URL=$(echo "$SVC" | python3 -c \
          "import sys,json; d=json.load(sys.stdin); print(d.get('serviceDetails',{}).get('url',''))" \
          2>/dev/null || echo "")
        echo "url=${URL}" >> $GITHUB_OUTPUT
        echo "Render staging deploy triggered. URL: ${URL}"

    - name: Deploy to Render (production)
      id: deploy-render-prod
      if: inputs.target == 'render' && inputs.environment == 'production'
      shell: bash
      env:
        RENDER_API_KEY: ${{ inputs.render_api_key }}
      run: |
        echo "Triggering Render production deploy for service: ${{ inputs.render_service_id }}"
        RESPONSE=$(curl -s -o /tmp/render_response.json -w "%{http_code}" \
          -X POST \
          -H "Authorization: Bearer ${RENDER_API_KEY}" \
          -H "Content-Type: application/json" \
          "https://api.render.com/v1/services/${{ inputs.render_service_id }}/deploys" \
          --data '{"clearCache": "do_not_clear"}')
        cat /tmp/render_response.json
        if [ "$RESPONSE" != "201" ]; then
          echo "::error::Render production deploy API returned HTTP $RESPONSE"
          exit 1
        fi
        # Poll deploy status until complete (max 5 minutes)
        DEPLOY_ID=$(python3 -c \
          "import json; d=json.load(open('/tmp/render_response.json')); print(d.get('id',''))" \
          2>/dev/null || echo "")
        if [ -n "$DEPLOY_ID" ]; then
          echo "Polling deploy $DEPLOY_ID ..."
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              "https://api.render.com/v1/services/${{ inputs.render_service_id }}/deploys/${DEPLOY_ID}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null)
            echo "  Deploy status: $STATUS"
            if [ "$STATUS" = "live" ]; then break; fi
            if [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "build_failed" ]; then
              echo "::error::Render deploy failed with status: $STATUS"
              exit 1
            fi
          done
        fi
        # Get service URL
        SVC=$(curl -s \
          -H "Authorization: Bearer ${RENDER_API_KEY}" \
          "https://api.render.com/v1/services/${{ inputs.render_service_id }}")
        URL=$(echo "$SVC" | python3 -c \
          "import sys,json; d=json.load(sys.stdin); print(d.get('serviceDetails',{}).get('url',''))" \
          2>/dev/null || echo "")
        echo "url=${URL}" >> $GITHUB_OUTPUT
        echo "Render production deploy complete. URL: ${URL}"

    # =========================================================================
    # CUSTOM
    # =========================================================================
    - name: Deploy (custom command)
      id: deploy-custom
      if: inputs.target == 'custom' && inputs.custom_command != ''
      shell: bash
      run: |
        echo "Running custom deploy command..."
        ${{ inputs.custom_command }}
        echo "url=" >> $GITHUB_OUTPUT

    # =========================================================================
    # CAPTURE URL — normalise output across all adapters
    # =========================================================================
    - name: Capture deploy URL
      id: capture-url
      shell: bash
      run: |
        URL=""
        # Try each adapter's output in order
        for step_url in \
          "${{ steps.deploy-vercel-staging.outputs.url }}" \
          "${{ steps.deploy-vercel-prod.outputs.url }}" \
          "${{ steps.deploy-railway-staging.outputs.url }}" \
          "${{ steps.deploy-railway-prod.outputs.url }}" \
          "${{ steps.deploy-heroku-staging.outputs.url }}" \
          "${{ steps.deploy-heroku-prod.outputs.url }}" \
          "${{ steps.deploy-render-staging.outputs.url }}" \
          "${{ steps.deploy-render-prod.outputs.url }}" \
          "${{ steps.deploy-custom.outputs.url }}"; do
          if [ -n "$step_url" ]; then
            URL="$step_url"
            break
          fi
        done
        echo "url=$URL" >> $GITHUB_OUTPUT
        if [ -n "$URL" ]; then
          echo "Deploy URL: $URL"
        fi

    # =========================================================================
    # GATE
    # =========================================================================
    - name: Evaluate deploy gate
      id: gate
      if: always()
      shell: bash
      run: |
        # Check if any deploy step failed
        outcomes=(
          "${{ steps.deploy-vercel-staging.outcome }}"
          "${{ steps.deploy-vercel-prod.outcome }}"
          "${{ steps.deploy-railway-staging.outcome }}"
          "${{ steps.deploy-railway-prod.outcome }}"
          "${{ steps.deploy-heroku-staging.outcome }}"
          "${{ steps.deploy-heroku-prod.outcome }}"
          "${{ steps.deploy-render-staging.outcome }}"
          "${{ steps.deploy-render-prod.outcome }}"
          "${{ steps.deploy-custom.outcome }}"
        )
        status="success"
        for o in "${outcomes[@]}"; do
          if [ "$o" = "failure" ]; then
            status="failure"
            break
          fi
        done
        echo "status=$status" >> $GITHUB_OUTPUT
        echo "Deploy gate: $status"

    # =========================================================================
    # POST-DEPLOY SUMMARY
    # =========================================================================
    - name: Write deploy summary
      if: always()
      shell: bash
      run: |
        python3 "${{ github.action_path }}/write_deploy_summary.py" \
          --environment  "${{ inputs.environment }}" \
          --target       "${{ inputs.target }}" \
          --status       "${{ steps.gate.outputs.status }}" \
          --url          "${{ steps.capture-url.outputs.url }}" \
          --project      "${{ inputs.project_name }}" \
          --commit       "${{ github.sha }}" \
          --actor        "${{ github.actor }}"
