name: "Setup runtime"
description: "Installs the correct runtime and dependencies based on pipeline.config.yml"

inputs:
  language:
    description: "Runtime language (node|python|java|go|csharp|php)"
    required: true
  version:
    description: "Runtime version"
    required: true
  install_command:
    description: "Dependency install command"
    required: true
  build_command:
    description: "Build command (empty string to skip)"
    required: false
    default: ""
  artifact_path:
    description: "Path to upload as build artifact (empty string to skip)"
    required: false
    default: ""
  build_tool:
    description: 'Java build tool configuration (maven or gradle)'
    required: false
    default: 'maven'  # Keeps it backward compatible with your existing setup

runs:
  using: "composite"
  steps:

    # ── Node.js ──────────────────────────────────────────────────────────────
    - name: Setup Node.js
      if: inputs.language == 'node'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.version }}
        cache: "npm"

    # ── Python ───────────────────────────────────────────────────────────────
    - name: Install uv
      if: inputs.language == 'python'
      uses: astral-sh/setup-uv@v5

    - name: Setup Python
      if: inputs.language == 'python'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.version }}
        cache: "pip"    

    # ── Java ─────────────────────────────────────────────────────────────────
    - name: Setup Java
      if: inputs.language == 'java'
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.version }}
        distribution: "temurin"
        cache: ${{ inputs.build_tool }} # Dynamic cache engine selection    

    # ── Go ───────────────────────────────────────────────────────────────────
    - name: Setup Go
      if: inputs.language == 'go'
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.version }}
        cache: true

    # ── C# / .NET ────────────────────────────────────────────────────────────
    - name: Setup .NET
      if: inputs.language == 'csharp'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.version }}

    - name: Cache NuGet packages
      if: inputs.language == 'csharp'
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ inputs.version }}-${{ hashFiles('**/*.csproj') }}
        restore-keys: nuget-${{ inputs.version }}-

    # ── PHP ──────────────────────────────────────────────────────────────────
    - name: Setup PHP
      if: inputs.language == 'php'
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.version }}
        tools: composer

    - name: Cache Composer packages
      if: inputs.language == 'php'
      uses: actions/cache@v4
      with:
        path: vendor/
        key: composer-${{ inputs.version }}-${{ hashFiles('composer.lock') }}
        restore-keys: composer-${{ inputs.version }}-

    # ── Install dependencies (all languages) ─────────────────────────────────
    - name: Install dependencies
      shell: bash
      run: ${{ inputs.install_command }}

    # ── Build (skip if build_command is empty) ────────────────────────────────
    - name: Build
      if: inputs.build_command != ''
      shell: bash
      run: ${{ inputs.build_command }}

    # ── Upload artifact (skip if artifact_path is empty) ─────────────────────
    - name: Upload build artifact
      if: inputs.artifact_path != ''
      uses: actions/upload-artifact@v4
      with:
        name: build-artifact
        path: ${{ inputs.artifact_path }}
        retention-days: 1
        if-no-files-found: error
